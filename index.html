<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadwell MLB Betting Pool 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>MLB Weekly Tracker & Pool (2026)</h1>
    </header>
    
    <main>
        <section class="card">
            <h2>1. Select Week</h2>
            <p class="subtitle">Select a date range to fetch games and calculate pool points.</p>
            <div class="controls">
                <label>Start Date: <input type="date" id="start-date"></label>
                <label>End Date: <input type="date" id="end-date"></label>
                <button id="fetch-data-btn">Load Games</button>
            </div>
        </section>

        <section class="card">
            <h2>2. Betting Pool Management</h2>
            <div class="controls">
                <input type="text" id="new-user-name" placeholder="Player Name">
                <select id="team-select">
                    <option value="">Loading Teams...</option>
                </select>
                <button id="add-user-btn">Assign Team to Player</button>
            </div>
            <button id="clear-pool-btn" class="danger">Clear Pool Data</button>
        </section>

        <section class="card">
            <h2>3. Weekly Leaderboard</h2>
            <table id="leaderboard-table">
                <thead>
                    <tr>
                        <th>Player</th>
                        <th>Assigned Teams (Wins in range)</th>
                        <th>Total Points</th>
                    </tr>
                </thead>
                <tbody>
                    </tbody>
            </table>
        </section>

        <section class="card">
            <h2>4. Game Results & Schedule</h2>
            <div id="games-container" class="games-grid">
                </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
